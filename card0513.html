<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;        
        }
        .card-body {
            width: 300px;
        }
        .card-img {
            position: relative;       
        }
        .card-img img {              
            width: 100%;
            height: auto;
            object-fit: cover;
            display: block;
        }
        .new{
            position: absolute;
            background-color: rgb(223, 19, 19);
            color: white;
            top: 5px;
            right: 5px;
            padding: 12px 16px;
            border-radius: 5px; /* 圓角 */
            font-size: 14px;
            font-weight: bold;
        }
        .content{
            font-size: 12px;
            font-weight: bold;
            background-color: brown;
            color: antiquewhite;
            border-radius: 0px 0px 5px 5px;
            line-height: 1.6;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="card-body">
        <div class="card-img">
            <img src="IMG_1010.JPG">
            <div class="new">NEW</div>
        <div class="content">Lorem ipsum dolor sit, amet consectetur adipisicing elit. Neque quaerat molestiae expedita, maiores est sequi velit, corporis molestias assumenda nulla dicta blanditiis! Iste numquam ea unde, cum rem recusandae debitis.</div>
    </div>
</body>
</html>
